name: Laravel Engineering CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-engineering-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - run: composer install --no-interaction --prefer-dist

      - name: Scaffold daily entry if missing
        run: |
          DATE=$(date -u +%Y-%m-%d)
          DIR="days/${DATE}"
          if [ ! -d "$DIR" ]; then
            mkdir -p "$DIR"
          
            tee "${DIR}/concept.php" > /dev/null << 'ENDPHP'
          <?php declare(strict_types=1);
          namespace App\Daily;
          class DailyConcept {
              public function execute(): string { return 'Replace with senior-level concept'; }
          }
          ENDPHP

            tee "${DIR}/concept-test.php" > /dev/null << 'ENDPHP'
          <?php declare(strict_types=1);
          use App\Daily\DailyConcept;
          it('implements today concept', function () {
              expect((new DailyConcept())->execute())->toBeString();
          });
          ENDPHP

            tee "${DIR}/notes.md" > /dev/null << ENDMARKDOWN
          # 📅 ${DATE}
          ## 🎯 Concept
          - 
          ## 🏗️ Architecture/Performance Decision
          - 
          ## ⚠️ Trade-offs & Alternatives Considered
          - 
          ## 📚 References
          - 
          ENDMARKDOWN

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "chore(daily): scaffold $(date -u +%Y-%m-%d)"
              git push
            fi
          fi
      - name: Run Quality Gates
        run: |
          php vendor/bin/pint --test
          php vendor/bin/phpstan analyse --memory-limit=1G
          php vendor/bin/pest days/ --parallel