name: Laravel Engineering CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scaffold-daily:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create daily entry if missing
        run: |
          DATE=$(date -u +%Y-%m-%d)
          DIR="days/${DATE}"
          if [ ! -d "$DIR" ]; then
            mkdir -p "$DIR"
            cat > "${DIR}/concept.php" << 'PHP'
            <?php declare(strict_types=1);
            namespace App\Daily;
            class DailyConcept {
                public function execute(): string {
                    return 'Replace with senior-level concept implementation';
                }
            }
            PHP
            cat > "${DIR}/concept-test.php" << 'PHP'
            <?php declare(strict_types=1);
            use App\Daily\DailyConcept;
            it('implements today\'s architectural concept', function () {
                $concept = new DailyConcept();
                expect($concept->execute())->toBeString();
            });
            PHP
            cat > "${DIR}/notes.md" << EOF
            # 📅 ${DATE}
            ## 🎯 Concept
            - 
            ## 🏗️ Architecture/Performance Decision
            - 
            ## ⚠️ Trade-offs & Alternatives Considered
            - 
            ## 📚 References / Laravel Docs
            - 
            EOF
          fi

      - name: Commit & push scaffold
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(daily): scaffold $(date -u +%Y-%m-%d)"
            git push
          fi

  quality-gate:
    needs: scaffold-daily
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - run: composer install --no-interaction --prefer-dist

      - run: php vendor/bin/pint --test
      - run: php vendor/bin/phpstan analyse --memory-limit=1G
      - run: php vendor/bin/pest days/ --parallel
